version: '3.8'

services:

  supermarket:
    image: supermarket-app:latest
    container_name: supermarket-container
    ports:
      - "80:80"
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-container
    ports:
      - "8081:80"
    restart: always

  ruphan:
    image: ruphan24:sample-image
    container_name: ruphan-container
    ports:
      - "8082:80"
    restart: always
